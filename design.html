<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Design Showcase</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:linear-gradient(to right,#ff9a9e,#fad0c4)}
header{background:rgba(255,255,255,.9);padding:18px;display:flex;justify-content:center;align-items:center;gap:10px;box-shadow:0 2px 10px rgba(0,0,0,.15)}
.live{color:red;font-weight:bold;animation:blink 1s infinite}
@keyframes blink{50%{opacity:0}}
.btn{display:block;margin:20px auto;padding:12px 24px;border:none;border-radius:8px;background:#ff758c;color:#fff;font-size:18px;cursor:pointer}
.gallery{display:none;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:20px;padding:20px;max-width:1400px;margin:auto}
.gallery img,.gallery video{width:100%;height:230px;object-fit:cover;border-radius:12px;background:#000;transition:.3s;cursor:pointer}
.gallery img:hover,.gallery video:hover{transform:scale(1.03);box-shadow:0 8px 18px rgba(0,0,0,.3)}
.modal{display:none;position:fixed;left:0;top:0;width:100%;height:100%;background:rgba(0,0,0,.95);z-index:9999;justify-content:center;align-items:center;padding:20px}
.modal img{max-width:95%;max-height:95%;object-fit:contain;border-radius:10px}
.close{position:absolute;top:15px;right:30px;color:#fff;font-size:50px;cursor:pointer}
</style>
</head>
<body>

<div id="imageModal" class="modal">
<span class="close">&times;</span>
<img id="modalImage" alt="">
</div>


<script>
document.addEventListener("DOMContentLoaded", function () {

    const gallery = document.getElementById("designGallery");
    const modal = document.getElementById("imageModal");
    const modalImg = document.getElementById("modalImage");
    const closeBtn = document.querySelector(".close");

    // Show Gallery
    window.showDesigns = function () {
        gallery.style.display = "grid";
    };

    // Open image popup
    gallery.querySelectorAll("img").forEach(img => {
        img.addEventListener("click", function () {
            modal.style.display = "flex";
            modalImg.src = this.src;
            modalImg.alt = this.alt;
        });
    });

    // Close popup
    closeBtn.addEventListener("click", function () {
        modal.style.display = "none";
    });

    // Close when clicking outside image
    modal.addEventListener("click", function (e) {
        if (e.target === modal) {
            modal.style.display = "none";
        }
    });

    // ESC key
    document.addEventListener("keydown", function (e) {
        if (e.key === "Escape") {
            modal.style.display = "none";
        }
    });

});
</script>
